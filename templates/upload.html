{% extends "base.html" %}
{% block title %}New memory &middot; Memoria{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card upload-card">
    <h1>Keep a memory</h1>
    <p class="muted">Add a photo or short video, and anything you remember about it.</p>
    <form method="post" enctype="multipart/form-data">
      <label class="file-drop" id="file-drop">
        <input type="file" name="media" id="media-input" accept="image/*,video/mp4,video/webm,video/quicktime" required>
        <span id="file-drop-label">Choose a photo or video&hellip;</span>
      </label>
      <div id="preview-wrap"></div>

      <label>Caption
        <textarea name="caption" rows="3" placeholder="What was happening here?"></textarea>
      </label>
      <div class="form-row">
        <label>Where
          <input type="text" name="location" placeholder="e.g. Lake Tahoe">
        </label>
        <label>When
          <input type="text" name="memory_date" placeholder="e.g. Summer 2019">
        </label>
      </div>

      <label class="map-picker-label">
        Drop a pin (optional)
        <span class="muted map-picker-hint">Click the map to mark where this happened &mdash; shows up on your Timeline map.</span>
      </label>
      <div id="pin-map"></div>
      <div id="pin-status" class="muted pin-status">No pin set.</div>
      <button type="button" id="clear-pin" class="btn-text-accent" style="display:none;">Clear pin</button>
      <input type="hidden" name="latitude" id="latitude">
      <input type="hidden" name="longitude" id="longitude">

      <fieldset class="visibility-toggle">
        <legend>Who can see this?</legend>
        <label class="radio-option">
          <input type="radio" name="visibility" value="private" checked>
          <span><strong>Private</strong> &mdash; only visible to you</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="visibility" value="public">
          <span><strong>Public</strong> &mdash; shows up in everyone's feed</span>
        </label>
      </fieldset>

      <button type="submit" class="btn-solid">Save memory</button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const input = document.getElementById('media-input');
const label = document.getElementById('file-drop-label');
const previewWrap = document.getElementById('preview-wrap');
input.addEventListener('change', () => {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  label.textContent = file.name;
  previewWrap.innerHTML = '';
  const url = URL.createObjectURL(file);
  if (file.type.startsWith('video/')) {
    const v = document.createElement('video');
    v.src = url; v.controls = true; v.className = 'preview-media';
    previewWrap.appendChild(v);
  } else {
    const img = document.createElement('img');
    img.src = url; img.className = 'preview-media';
    previewWrap.appendChild(img);
  }
});

// Pin picker map
const pinMap = L.map('pin-map').setView([20, 0], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(pinMap);

let pinMarker = null;
const latInput = document.getElementById('latitude');
const lngInput = document.getElementById('longitude');
const pinStatus = document.getElementById('pin-status');
const clearBtn = document.getElementById('clear-pin');

function setPin(lat, lng) {
  latInput.value = lat.toFixed(6);
  lngInput.value = lng.toFixed(6);
  pinStatus.textContent = `Pinned at ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  clearBtn.style.display = '';
  if (pinMarker) {
    pinMarker.setLatLng([lat, lng]);
  } else {
    pinMarker = L.marker([lat, lng]).addTo(pinMap);
  }
}

pinMap.on('click', (e) => setPin(e.latlng.lat, e.latlng.lng));

clearBtn.addEventListener('click', () => {
  latInput.value = '';
  lngInput.value = '';
  pinStatus.textContent = 'No pin set.';
  clearBtn.style.display = 'none';
  if (pinMarker) {
    pinMap.removeLayer(pinMarker);
    pinMarker = null;
  }
});
</script>
{% endblock %}
