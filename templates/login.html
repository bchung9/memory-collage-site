{% extends "base.html" %}
{% block title %}Log in &middot; Memoria{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="muted">Log in to see what you've kept.</p>
    <form method="post">
      <label>Username
        <input type="text" name="username" required autofocus>
      </label>
      <label>Password
        <input type="password" name="password" required>
      </label>
      <button type="submit" class="btn-solid">Log in</button>
    </form>
    <p class="auth-switch">New here? <a href="{{ url_for('register') }}">Create an account</a></p>
  </div>
</div>
{% endblock %}
